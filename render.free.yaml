# Render 無料お試し用（本番非推奨）
#
# ⚠️ 注意:
# - 15分アクセスなしでスリープ（起動に30〜60秒）
# - 永続ディスクなし → 投稿・DB・画像は再起動で消える
# - 趣味の動作確認・デモのみ向け
#
# 本番運用は render.yaml（有料）か VPS を使ってください。
# 費用: coupon-board/COST.md 参照

services:
  - type: web
    name: shotime-demo
    runtime: docker
    plan: free
    rootDir: coupon-board
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_OPERATOR_NAME
        value: 招待みんなでショータイム運営
      - key: NEXT_PUBLIC_CONTACT_EMAIL
        sync: false
