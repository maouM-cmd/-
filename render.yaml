# Render Blueprint（有料・本番向け）
#
# ⚠️ 月額 約 $7〜10（Starter + ディスク）かかります
# 無料でやりたい場合 → coupon-board/COST.md を参照
#
# Dashboard → New → Blueprint → このリポジトリを選択
# 必須: 環境変数 ADMIN_PASSWORD を設定

services:
  - type: web
    name: shotime
    runtime: docker
    plan: starter
    rootDir: coupon-board
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_OPERATOR_NAME
        value: 招待みんなでショータイム運営
      - key: NEXT_PUBLIC_CONTACT_EMAIL
        sync: false
    disk:
      name: shotime-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: prompt-dojo
    runtime: docker
    plan: starter
    rootDir: prompt-dojo
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_NAME
        value: プロンプ道場
      - key: NEXT_PUBLIC_OPERATOR_NAME
        value: プロンプ道場運営
      - key: NEXT_PUBLIC_CONTACT_EMAIL
        sync: false
    disk:
      name: prompt-dojo-data
      mountPath: /app/data
      sizeGB: 1
