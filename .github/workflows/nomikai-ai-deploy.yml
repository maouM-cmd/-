name: Deploy nomikai-ai to Render

on:
  push:
    branches: [main]
    paths:
      - "nomikai-ai/**"
      - ".github/workflows/nomikai-ai-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Render CLI
        run: |
          curl -L https://github.com/render-oss/cli/releases/download/v2.21.0/cli_2.21.0_linux_amd64.zip -o render.zip
          unzip render.zip
          sudo mv cli_v2.21.0 /usr/local/bin/render

      - name: Trigger deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.NOMAIKAI_AI_RENDER_SERVICE_ID }}
          CI: true
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$SERVICE_ID" ]; then
            echo "Render secrets not configured — skipping deploy"
            echo "Set RENDER_API_KEY and NOMAIKAI_AI_RENDER_SERVICE_ID in repo Secrets"
            exit 0
          fi
          render deploys create "$SERVICE_ID" --output json --confirm
