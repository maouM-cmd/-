name: Prompt Dojo CI

on:
  push:
    branches: [main, "cursor/**"]
    paths:
      - "prompt-dojo/**"
  pull_request:
    paths:
      - "prompt-dojo/**"

defaults:
  run:
    working-directory: prompt-dojo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prompt-dojo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
