name: CI

on:
  push:
    branches: [main, "cursor/**"]
    paths:
      - "coupon-board/**"
  pull_request:
    paths:
      - "coupon-board/**"

defaults:
  run:
    working-directory: coupon-board

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: coupon-board/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
