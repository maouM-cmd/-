name: optimal-match CI

on:
  push:
    branches: [main, "cursor/**"]
    paths:
      - "optimal-match/**"
  pull_request:
    paths:
      - "optimal-match/**"

defaults:
  run:
    working-directory: optimal-match

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: optimal-match/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
