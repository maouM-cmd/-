services:
  - type: web
    name: prompt-dojo
    runtime: docker
    plan: starter
    rootDir: prompt-dojo
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_NAME
        value: プロンプ道場
      - key: NEXT_PUBLIC_OPERATOR_NAME
        value: プロンプ道場運営
      - key: NEXT_PUBLIC_CONTACT_EMAIL
        sync: false
    disk:
      name: prompt-dojo-data
      mountPath: /app/data
      sizeGB: 1
