services:
  - type: web
    name: prompt-dojo
    runtime: docker
    plan: starter
    rootDir: prompt-dojo
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: APPLE_ID
        sync: false
      - key: APPLE_SECRET
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_AUTH_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_GITHUB_AUTH_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_DAILY_LIMIT
        value: "10"
      - key: LLM_CHALLENGE_GEN_LIMIT
        value: "5"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: NEXT_PUBLIC_SITE_NAME
        value: プロンプ道場
      - key: NEXT_PUBLIC_OPERATOR_NAME
        value: プロンプ道場運営
      - key: NEXT_PUBLIC_CONTACT_EMAIL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NEXT_PUBLIC_ADSENSE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_ADSENSE_SLOT
        sync: false
    disk:
      name: prompt-dojo-data
      mountPath: /app/data
      sizeGB: 1
