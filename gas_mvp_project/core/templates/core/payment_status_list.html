{% extends "core/base.html" %}
{% block content %}
<h2>入金管理一覧</h2>
<table>
  <thead>
    <tr><th>請求番号</th><th>顧客</th><th>期限</th><th>請求額</th><th>ステータス</th></tr>
  </thead>
  <tbody>
    {% for i in invoices %}
    <tr>
      <td>{{ i.invoice_no }}</td>
      <td>{{ i.customer.name }}</td>
      <td>{{ i.due_date }}</td>
      <td>{{ i.total_amount }}</td>
      <td>{{ i.get_status_display }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="5">データがありません</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
