{% extends "core/base.html" %}
{% block content %}
<h2>検針入力</h2>
<form method="post">
  {% csrf_token %}
  {% for field in form %}
    <div class="form-row">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="message error">{{ field.errors }}</div>{% endif %}
    </div>
  {% endfor %}
  <button class="btn" type="submit">登録</button>
  <a class="btn secondary" href="{% url 'core:meter_reading_list' %}">戻る</a>
</form>
{% endblock %}
